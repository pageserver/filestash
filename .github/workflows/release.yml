name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: filestash
          - goos: linux
            goarch: arm64
            output: filestash
          - goos: darwin
            goarch: amd64
            output: filestash
          - goos: darwin
            goarch: arm64
            output: filestash
          - goos: windows
            goarch: amd64
            output: filestash.exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Get dependencies
        run: go get ./...

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build --tags "fts5" -ldflags="-s -w" -o ${{ matrix.output }} cmd/main.go

      - name: Create archive
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip filestash-${{ matrix.goos }}-${{ matrix.goarch }}.zip ${{ matrix.output }}
          else
            tar -czvf filestash-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz ${{ matrix.output }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filestash-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            filestash-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: filestash-*
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
